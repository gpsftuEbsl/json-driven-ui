<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早療情境互動遊戲</title>
    <style>
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        #scene-image {
            max-width: 100%;
            height: auto;
            max-height: 250px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: none;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: #2c3e50;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: white;
            width: 100%;
        }

        #btn1 { background-color: rgb(75, 163, 119); }
        #btn2 { background-color: rgb(82, 119, 171); }
    </style>
</head>

<body>
    <img id="scene-image" src="" alt="情境圖片">

    <h1 id="title">載入劇情中...</h1>

    <div class="btn-container">
        <button id="btn1" style="display:none;">選項一</button>
        <button id="btn2" style="display:none;">選項二</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const btn1El = document.getElementById('btn1');
        const btn2El = document.getElementById('btn2');
        const titleEl = document.getElementById('title');

        function initGame() {
            const story = urlParams.get('story');
            const opt1 = urlParams.get('opt1');
            const opt2 = urlParams.get('opt2');

            document.getElementById('scene-image').style.display = 'none';

            if (!story || !opt1 || !opt2) {
                titleEl.innerText = '缺少故事參數，請從 LINE 重新進入。';
                btn1El.style.display = 'none';
                btn2El.style.display = 'none';
                return;
            }

            titleEl.innerText = story;
            btn1El.innerText = opt1;
            btn2El.innerText = opt2;
            btn1El.style.display = 'block';
            btn2El.style.display = 'block';
        }

        function sendChoice(choiceText) {
            alert('你選了: ' + choiceText);
        }

        btn1El.addEventListener('click', () => sendChoice(btn1El.innerText));
        btn2El.addEventListener('click', () => sendChoice(btn2El.innerText));

        window.onload = initGame;
    </script>
</body>
</html>
